<!-- src/chat-hub/ChatHub.html -->
<div class="chat-hub-container flex h-screen surface-ground">
    <!-- Columna Izquierda (Sidebar de Canales) -->
    <aside class="chat-hub-sidebar w-18rem flex-shrink-0 border-right-1 surface-border">
        <div id="channel-sidebar-container" class="h-full"></div>
    </aside>

    <!-- Columna Central (Área de Chat Principal) -->
    <main class="chat-hub-main-content flex-grow-1 flex flex-column">
        <div id="chat-window-container" class="h-full"></div>
    </main>

    <!-- Columna Derecha (AI Insights y Pinned Assets) -->
    <aside class="chat-hub-info-panel w-25rem flex-shrink-0 border-left-1 surface-border flex flex-column">
        <div id="ai-insights-panel-container" class="flex-grow-0"></div>
        <div id="pinned-assets-panel-container" class="flex-grow-1"></div>
    </aside>
</div>
