<!-- src/chat-hub/components/ai-insights-panel/ai-insights-panel.html -->
<link rel="stylesheet" href="./ai-insights-panel.css">
<div class="ai-insights-panel card">
    <div class="card-header">
        <span class="ai-icon">✨</span>
        <h3 class="card-title">AI INSIGHTS</h3>
    </div>
    <div class="card-body">
        <p class="insight-tag">RECENT MEETING <span class="time-ago">45m ago</span></p>
        <h4 class="meeting-title">Q3 Planning Sync: Steering Committee</h4>
        <ul class="insights-list">
            <li><span class="insight-icon check">✅</span> Decision: Approved 12% budget shift to infrastructure phase.</li>
            <li><span class="insight-icon action">🔵</span> Action: Elena to finalize Gantt by EOD Friday.</li>
        </ul>
        <div class="sentiment-section">
            <span class="sentiment-label">Channel Sentiment:</span>
            <div class="sentiment-bar-container">
                <div class="sentiment-bar productive" style="width: 90%;"></div>
                <div class="sentiment-bar unproductive" style="width: 10%;"></div>
            </div>
            <span class="sentiment-text">Productive</span>
        </div>
    </div>
    <div class="card-footer">
        <button class="full-transcript-button">VIEW FULL TRANSCRIPT</button>
    </div>
</div>
