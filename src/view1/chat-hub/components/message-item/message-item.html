<!-- src/chat-hub/components/message-item/message-item.html -->
<div class="message-item flex mb-5"> <!-- Increased vertical spacing -->
    <img class="message-avatar w-10 h-10 rounded-full object-cover mr-3 flex-shrink-0" src="" alt="User Avatar"> <!-- src attribute is now empty -->
    <div class="message-content flex-grow-1">
        <div class="message-header flex align-items-center mb-1">
            <span class="message-author font-bold text-900 mr-2"></span>
            <span class="message-timestamp text-xs text-400"></span> <!-- Lighter gray for timestamp -->
        </div>
        <p class="message-text text-700 line-height-3 m-0 leading-relaxed"></p> <!-- Added leading-relaxed -->
        <div class="message-attachments mt-2 flex flex-column gap-2">
            <!-- Attachment items will be rendered here dynamically by JS -->
        </div>
        <div class="message-reactions flex gap-2 mt-2">
            <!-- Reaction pills will be rendered here dynamically by JS -->
        </div>
    </div>
</div>
