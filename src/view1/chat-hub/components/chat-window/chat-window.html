<!-- src/chat-hub/components/chat-window/chat-window.html -->
<div class="chat-window">
    <header class="chat-header">
        <div class="channel-info">
            <i class="pi pi-hashtag"></i>
            <div>
                <h2 class="channel-title">pmo-strategic-alignment</h2>
                <p class="channel-description">Strategic discussions for Q3 planning.</p>
            </div>
        </div>
        <div class="header-actions">
            <button style="background: white; border: 1px solid #d1d5db; padding: 0.5rem 1rem; border-radius: 999px; font-size: 0.875rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                <i class="pi pi-users"></i>
                <span>12 Members</span>
            </button>
            <i class="pi pi-star" style="font-size: 1.25rem; cursor: pointer;"></i>
        </div>
    </header>

    <div class="message-list">
        <!-- Date Separator -->
        <div style="display: flex; align-items: center; margin: 1.5rem 0; text-align: center;">
            <div style="flex: 1; border-top: 1px solid #e5e7eb;"></div>
            <span style="padding: 0 1rem; font-size: 0.75rem; font-weight: 600; color: #d1d5db; text-transform: uppercase;">TODAY</span>
            <div style="flex: 1; border-top: 1px solid #e5e7eb;"></div>
        </div>

        <!-- MessageItem components will be rendered here -->
        <div id="message-item-container-1"></div>
        <div id="message-item-container-2"></div>
        <div id="message-item-container-3"></div>
        <div id="message-item-container-4"></div>
        <!-- More messages -->
    </div>

    <div class="message-input-area">
        <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem;">
            <button style="background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.125rem; padding: 0.5rem;">
                <i class="pi pi-bold"></i>
            </button>
            <button style="background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.125rem; padding: 0.5rem;">
                <i class="pi pi-italic"></i>
            </button>
            <button style="background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.125rem; padding: 0.5rem;">
                <i class="pi pi-link"></i>
            </button>
            <button style="background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.125rem; padding: 0.5rem;">
                <i class="pi pi-bars"></i>
            </button>
        </div>
        <div class="input-controls">
            <textarea class="message-input" rows="1" placeholder="Message #pmo-strategic-alignment"></textarea>
            <div style="display: flex; gap: 0.5rem;">
                <button style="background: none; border: none; color: #2563eb; cursor: pointer; font-size: 1.25rem; padding: 0.5rem;">
                    <i class="pi pi-plus-circle"></i>
                </button>
                <button style="background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.25rem; padding: 0.5rem;">
                    <i class="pi pi-face-smile"></i>
                </button>
                <button class="send-button">
                    <i class="pi pi-send"></i>
                </button>
            </div>
        </div>
    </div>
</div>
