<!-- src/chat-hub/components/chat-window/chat-window.html -->
<link rel="stylesheet" href="./chat-window.css">
<div class="chat-window">
    <header class="chat-header">
        <div class="channel-info">
            <h2 class="channel-title">pmo-strategic-alignment</h2>
            <p class="channel-description">Strategic discussions for Q3 planning.</p>
        </div>
        <div class="header-actions">
            <span class="members-badge">
                <i class="icon-group"></i> 12 Members
            </span>
            <i class="icon-star"></i> <!-- Star icon for favorite -->
        </div>
    </header>

    <div class="message-list">
        <!-- MessageItem components will be rendered here -->
        <div class="date-separator">TODAY</div>
        <div id="message-item-container-1"></div>
        <div id="message-item-container-2"></div>
        <div id="message-item-container-3"></div>
        <!-- More messages -->
    </div>

    <div class="message-input-area">
        <div class="toolbar">
            <button class="toolbar-button">B</button>
            <button class="toolbar-button">I</button>
            <button class="toolbar-button">Link</button>
            <button class="toolbar-button">List</button>
        </div>
        <textarea class="message-input" placeholder="Message #pmo-strategic-alignment"></textarea>
        <div class="input-controls">
            <button class="control-button icon-plus"></button>
            <button class="control-button icon-emoji"></button>
            <button class="send-button icon-send"></button>
        </div>
    </div>
</div>
