<!-- src/chat-hub/components/chat-window/chat-window.html -->
<div class="chat-window flex flex-column h-full">
    <header class="chat-header flex align-items-center justify-content-between p-3 border-bottom-1 surface-border bg-white">
        <div class="channel-info flex align-items-center">
            <i class="pi pi-hashtag text-xl text-500 mr-2"></i>
            <div class="flex flex-column">
                <h2 class="channel-title text-lg font-bold text-900 m-0">pmo-strategic-alignment</h2>
                <p class="channel-description text-sm text-600 m-0">Strategic discussions for Q3 planning.</p>
            </div>
        </div>
        <div class="header-actions flex align-items-center gap-3">
            <button class="p-button p-component p-button-outlined p-button-sm p-button-secondary border-round-3xl">
                <i class="pi pi-users mr-2"></i>
                <span>12 Members</span>
            </button>
            <i class="pi pi-star text-xl text-500 cursor-pointer hover:text-yellow-500 transition-colors transition-duration-150"></i>
        </div>
    </header>

    <div class="message-list flex-grow-1 overflow-y-auto p-3">
        <!-- Date Separator -->
        <div class="flex align-items-center my-4">
            <div class="flex-grow-1 border-top-1 surface-border"></div>
            <span class="px-3 text-xs font-semibold text-gray-400 uppercase">TODAY</span>
            <div class="flex-grow-1 border-top-1 surface-border"></div>
        </div>

        <!-- MessageItem components will be rendered here -->
        <div id="message-item-container-1"></div>
        <div id="message-item-container-2"></div>
        <div id="message-item-container-3"></div>
        <div id="message-item-container-4"></div>
        <!-- More messages -->
    </div>

    <div class="message-input-area p-3">
        <div class="flex align-items-end gap-2">
            <textarea class="message-input flex-grow-1 border-1 border-gray-300 rounded p-2 resize-none focus:outline-none text-700 placeholder-gray-400" rows="1" placeholder="Message #pmo-strategic-alignment"></textarea>
            <button class="send-button bg-blue-600 rounded-full w-9 h-9 flex align-items-center justify-content-center">
                <i class="pi pi-send text-white"></i>
            </button>
        </div>
    </div>
</div>
